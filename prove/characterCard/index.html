<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ethan Gilchrist">
    <meta name="description" content="Card with a character on it">
    <title>Character Card</title>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Card with a character on it">
    <meta property="og:url" content="https://ethangilchrist.github.io/WDD_131/prove/characterCard/index.html">
    <meta property="og:image" content="https://ethangilchrist.github.io/WDD_131/prove/characterCard/assets/image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Card with a character on it">
    <meta name="twitter:image" content="https://ethangilchrist.github.io/WDD_131/prove/characterCard/assets/image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="./favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="./assets/rafting-logo-tiny.png">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <img class="image" alt="Swamp creature">
        <h1 class="name"></h1>
        <div class="stats"></div>
        <div class="buttons">
            <button id="attackedButton">Attacked</button>
            <button id="levelupButton">Level Up</button>
        </div>
    </div>
</body>
</html>
