<head>

    <title>Recipe Book</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->

<body>
    <header>
        <img src="assets/recipe-book.png" alt="recipe book logo">
        <h1>RecipeBook</h1>
    </header>
    <body>
        <nav>
            <!-- couldn't get it to work :( -->
            <!-- UPDATE, IT WORKED TOO WELL -->
            <!-- <input type="search" style="background-image: url('assets/search.svg');"> -->
            <input type="search" id="search-bar">
            <img src="assets/search.svg" id="search-icon">
        </nav>
        <hr>
        <main>
            <div class="recipe">
                <img src="assets/apple-crisp.jpg" alt="Apple crisp dish">
                <div class="container">
                    <button>dessert</button>
                    <h2>Apple Crisp</h2>
                    <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>
                </div>
            </div>
        </main>
    </body>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="assets/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="assets/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="assets/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
